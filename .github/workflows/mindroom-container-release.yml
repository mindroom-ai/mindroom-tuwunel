name: MindRoom Release Containers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish containers for
        required: true
        type: string
      publish_latest:
        description: Also move the latest container tags
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: mindroom-release-containers-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  DOCKERHUB_ENABLED: ${{ vars.DOCKER_ACCT != '' && vars.DOCKER_REPO != '' && secrets.DOCKERHUB_TOKEN != '' }}

jobs:
  build:
    name: Build and push ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
            rust_target: x86_64-unknown-linux-gnu
            sys_target: x86_64-v1-linux-gnu
          - runner: ubuntu-24.04-arm
            arch: aarch64
            rust_target: aarch64-unknown-linux-gnu
            sys_target: aarch64-v8-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Capture container metadata
        id: meta
        run: echo "created=$(git log -1 --format=%cI)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: ${{ github.actor }}
          driver: docker-container
          install: true
          use: true
          buildkitd-flags: --allow-insecure-entitlement network.host

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_ENABLED == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ vars.DOCKER_ACCT }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Bake GHCR image
        env:
          CI: true
          bake_target: ghcr_io
          cargo_profile: release
          rust_toolchain: stable
          rust_target: ${{ matrix.rust_target }}
          feat_set: all
          sys_name: debian
          sys_version: testing-slim
          sys_target: ${{ matrix.sys_target }}
          git_ref: refs/tags/${{ env.RELEASE_TAG }}
          git_ref_name: ${{ env.RELEASE_TAG }}
          git_checkout: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
          docker_repo: ${{ vars.DOCKER_REPO }}
          package_version: ${{ env.RELEASE_TAG }}
          package_revision: ${{ github.sha }}
          package_last_modified: ${{ steps.meta.outputs.created }}
        run: docker/bake.sh ghcr_io

      - name: Bake Docker Hub image
        if: ${{ env.DOCKERHUB_ENABLED == 'true' }}
        env:
          CI: true
          bake_target: docker_io
          cargo_profile: release
          rust_toolchain: stable
          rust_target: ${{ matrix.rust_target }}
          feat_set: all
          sys_name: debian
          sys_version: testing-slim
          sys_target: ${{ matrix.sys_target }}
          git_ref: refs/tags/${{ env.RELEASE_TAG }}
          git_ref_name: ${{ env.RELEASE_TAG }}
          git_checkout: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
          docker_repo: ${{ vars.DOCKER_REPO }}
          package_version: ${{ env.RELEASE_TAG }}
          package_revision: ${{ github.sha }}
          package_last_modified: ${{ steps.meta.outputs.created }}
        run: docker/bake.sh docker_io

  manifest:
    name: Publish multi-arch tags
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_ENABLED == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ vars.DOCKER_ACCT }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish GHCR release tag
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          AMD64_TAG: ${{ env.RELEASE_TAG }}-release-all-x86_64-v1-linux-gnu
          ARM64_TAG: ${{ env.RELEASE_TAG }}-release-all-aarch64-v8-linux-gnu
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${RELEASE_TAG}" \
            "${IMAGE}:${AMD64_TAG}" \
            "${IMAGE}:${ARM64_TAG}"

      - name: Publish GHCR latest tag
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_latest) }}
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          AMD64_TAG: ${{ env.RELEASE_TAG }}-release-all-x86_64-v1-linux-gnu
          ARM64_TAG: ${{ env.RELEASE_TAG }}-release-all-aarch64-v8-linux-gnu
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${AMD64_TAG}" \
            "${IMAGE}:${ARM64_TAG}"

      - name: Publish Docker Hub release tag
        if: ${{ env.DOCKERHUB_ENABLED == 'true' }}
        env:
          IMAGE: docker.io/${{ vars.DOCKER_REPO }}
          AMD64_TAG: ${{ env.RELEASE_TAG }}-release-all-x86_64-v1-linux-gnu
          ARM64_TAG: ${{ env.RELEASE_TAG }}-release-all-aarch64-v8-linux-gnu
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${RELEASE_TAG}" \
            "${IMAGE}:${AMD64_TAG}" \
            "${IMAGE}:${ARM64_TAG}"

      - name: Publish Docker Hub latest tag
        if: ${{ env.DOCKERHUB_ENABLED == 'true' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_latest)) }}
        env:
          IMAGE: docker.io/${{ vars.DOCKER_REPO }}
          AMD64_TAG: ${{ env.RELEASE_TAG }}-release-all-x86_64-v1-linux-gnu
          ARM64_TAG: ${{ env.RELEASE_TAG }}-release-all-aarch64-v8-linux-gnu
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${AMD64_TAG}" \
            "${IMAGE}:${ARM64_TAG}"

      - name: Inspect GHCR manifest
        run: docker buildx imagetools inspect "ghcr.io/${GITHUB_REPOSITORY}:${RELEASE_TAG}"
